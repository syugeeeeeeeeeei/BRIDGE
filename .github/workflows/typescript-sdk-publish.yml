name: Publish TypeScript SDK

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: typescript-sdk-publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require SemVer tag
        run: |
          case "${GITHUB_REF_NAME}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *) echo "Tag must match vX.Y.Z" >&2; exit 1 ;;
          esac

      - name: Require tag commit on main
        run: |
          git fetch origin main
          TAG_COMMIT="$(git rev-list -n 1 "${GITHUB_REF_NAME}")"
          git merge-base --is-ancestor "${TAG_COMMIT}" origin/main

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Build and verify package candidate
        run: mise run package

      - name: Publish verified package
        run: mise run sdk:typescript:publish
